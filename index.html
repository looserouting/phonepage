<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css">
    <title>Support Hotline</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
      }
      #videoContainer {
        margin-bottom: 20px;
      }
      #title {
        margin-bottom: 20px;
        font-size: 24px;
        font-weight: bold;
      }
      #callButton {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      .volume-control {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="title">Support Hotline</div>
    <div id="videoContainer" style="position: relative; width: 640px; height: 320px;">
      <video id="remoteVideo" autoplay playsinline style="width: 100%; height: 100%; border: solid;"></video>
      <video id="localVideo" autoplay playsinline muted style="position: absolute; bottom: 0; right: 0; width: 160px; height: 90px; border: solid;"></video>
    </div>
    <audio id="remoteAudio"></audio>
    <button id="callButton">Anrufen</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
