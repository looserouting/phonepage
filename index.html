<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Support Hotline</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
      color: var(--text);
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: fit-content;
    }

    #videoContainer {
      position: relative;
      width: 640px;
      height: 360px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 160px;
      height: 90px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      object-fit: cover;
      background: #111;
    }

    #title {
      margin-bottom: 24px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #818cf8, #c084fc);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #callButton {
      padding: 12px 32px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    #callButton:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    #callButton.active {
      background: var(--danger);
    }

    #callButton.active:hover {
      background: var(--danger-hover);
    }

    #muteButton {
      padding: 12px 32px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: #6b7280;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-top: 12px;
      display: none;
    }

    #muteButton:hover {
      background: #4b5563;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    #muteButton.muted {
      background: #f59e0b;
    }

    #muteButton.muted:hover {
      background: #d97706;
    }

    #videoButton {
      padding: 12px 32px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: #6366f1;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-top: 12px;
      display: none;
    }

    #videoButton:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    #videoButton.video-off {
      background: #ef4444;
    }

    #videoButton.video-off:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>
  <div class="glass-card">
    <div id="title">Support Hotline</div>
    <div id="videoContainer">
      <audio id="remoteAudio"></audio>
      <video id="remoteVideo"></video>
      <video id="localVideo"></video>
    </div>
    <div id="callControls" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <label id="cameraToggle"
        style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #cbd5e1;">
        <input type="checkbox" id="cameraCheckbox" checked style="width: 16px; height: 16px; cursor: pointer;">
        📷 Mit Kamera
      </label>
      <button id="callButton">Anrufen</button>
    </div>
    <button id="muteButton">Stummschalten</button>
    <button id="videoButton">Video stoppen</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
